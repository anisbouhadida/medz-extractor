name: Bug report
description: Report a problem with the extractor script.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for a solo maintainer to reproduce it quickly.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
      placeholder: The extractor failed when processing input/2025-12.xlsx...
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command used
      description: Paste the exact command you ran.
      render: bash
      placeholder: .venv/bin/python scripts/extract_medz.py input output
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output or logs
      description: Paste the relevant stderr/log output.
      render: text
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.14.3"
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add anything else that may help reproduce or understand the issue.
    validations:
      required: false
