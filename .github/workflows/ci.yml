name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ tests/

      - name: Run ruff format check
        run: ruff format --check src/ tests/

  # ── 2. Test + Coverage ─────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest --cov=medz_extractor \
                 --cov-report=term-missing \
                 --cov-report=json:coverage.json

      - name: Extract coverage percentage
        id: cov
        run: |
          COV=$(python -c "
          import json, pathlib
          data = json.loads(pathlib.Path('coverage.json').read_text())
          print(int(data['totals']['percent_covered_display']))
          ")
          echo "pct=$COV" >> "$GITHUB_OUTPUT"

      - name: Determine badge color
        id: color
        run: |
          PCT=${{ steps.cov.outputs.pct }}
          if [ "$PCT" -ge 90 ]; then
            echo "color=brightgreen" >> "$GITHUB_OUTPUT"
          elif [ "$PCT" -ge 75 ]; then
            echo "color=green" >> "$GITHUB_OUTPUT"
          elif [ "$PCT" -ge 60 ]; then
            echo "color=yellow" >> "$GITHUB_OUTPUT"
          else
            echo "color=red" >> "$GITHUB_OUTPUT"
          fi

      - name: Update coverage badge via Gist
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: medz-extractor-coverage.json
          label: coverage
          message: "${{ steps.cov.outputs.pct }}%"
          color: ${{ steps.color.outputs.color }}
