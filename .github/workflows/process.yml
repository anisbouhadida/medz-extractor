name: Process nomenclature

on:
  push:
    branches: [main]
    paths:
      - "input/**.xlsx"

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run preprocessing
        run: |
          for f in input/*.xlsx; do
            month=$(basename "$f" .xlsx)
            medz-extractor "$f" --out "output/$month/"
          done

      - name: Commit CSV outputs
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: "chore: update CSV outputs"
          file_pattern: "output/**/*.csv"
