name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v1.2.3"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build release bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            git rev-parse --verify "refs/tags/${tag}" >/dev/null
          else
            tag="${GITHUB_REF_NAME}"
          fi

          case "${tag}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Tag must look like v1.2.3, got: ${tag}" >&2
              exit 1
              ;;
          esac

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Check out release tag
        run: git checkout --detach "${{ steps.version.outputs.tag }}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run release checks
        run: |
          ruff check scripts/ tests/
          ruff format --check scripts/ tests/
          pytest

      - name: Build release assets
        run: |
          tag="${{ steps.version.outputs.tag }}"
          name="medz-extractor-${tag}"
          mkdir -p "dist/${name}"

          cp scripts/extract_medz.py "dist/${name}/extract_medz.py"
          cp requirements.txt "dist/${name}/requirements.txt"
          cp README.md "dist/${name}/README.md"
          cp LICENSE "dist/${name}/LICENSE"
          cp -R docs "dist/${name}/docs"

          chmod +x "dist/${name}/extract_medz.py"

          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          (cd dist && zip -qr "${name}.zip" "${name}")
          (cd dist && sha256sum "${name}.tar.gz" "${name}.zip" > SHA256SUMS.txt)

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          gh release create "${tag}" \
            "dist/medz-extractor-${tag}.tar.gz" \
            "dist/medz-extractor-${tag}.zip" \
            "dist/SHA256SUMS.txt" \
            --title "medz-extractor ${tag}" \
            --notes "Release ${tag} of the medz-extractor preprocessing script."
